services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clinicalcontext
      POSTGRES_USER: cc
      POSTGRES_PASSWORD: cc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
